<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo NFC Socket</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        #status { color: #0f0; margin: 20px; }
    </style>
</head>
<body>
    <h1>Tabuleiro Online</h1>
    <div id="status">Conectando...</div>
    <div id="display">Aguardando jogada...</div>

    <script>
        const socket = io();
        const statusDiv = document.getElementById("status");
        const display = document.getElementById("display");

        socket.on("connect", () => {
            statusDiv.innerText = "✅ Conectado ao Servidor! ID: " + socket.id;
        });

        socket.on("atualizarDados", (dados) => {
            display.innerHTML = `<h3>Última Jogada:</h3><pre>${JSON.stringify(dados, null, 2)}</pre>`;
        });
    </script>
</body>
</html>
