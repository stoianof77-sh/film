<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle de Vídeo</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
        iframe { border: 5px solid #333; border-radius: 10px; width: 800px; height: 450px; background: #000; }
        input { padding: 10px; width: 400px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Controle Remoto via Socket</h1>
        
        <iframe src="tv.html" id="minhaTV"></iframe>

        <div class="controles">
            <input type="text" id="urlVideo" placeholder="URL do vídeo (.mp4)">
            <button onclick="transmitir()">Transmitir no Iframe de Todos</button>
        </div>
    </div>

    <script>
        const socket = io();

        function transmitir() {
            const url = document.getElementById('urlVideo').value;
            if (url) {
                // Envia para o servidor, que vai avisar a 'tv.html' dentro de todos os iframes
                socket.emit('mudarVideo', { url: url, tempo: 0 });
            }
        }
    </script>
</body>
</html>
