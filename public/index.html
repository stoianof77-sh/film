<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Stream via Iframe & Socket</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .painel { margin-bottom: 20px; background: #222; padding: 15px; border-radius: 8px; }
        input { padding: 10px; width: 300px; border-radius: 4px; border: none; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
        iframe { width: 800px; height: 450px; border: 2px solid #444; background: #000; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="painel">
        <input type="text" id="urlVideo" placeholder="URL do vídeo (.mp4)">
        <button onclick="transmitir()">Transmitir para Todos</button>
    </div>

    <iframe id="telaVideo" srcdoc="
        <html>
            <body style='margin:0; background:black; display:flex; align-items:center; justify-content:center;'>
                <video id='v' controls autoplay muted style='width:100%; height:100%;'></video>
                <script src='/socket.io/socket.io.js'></script>
                <script>
                    const s = io();
                    const v = document.getElementById('v');
                    
                    s.on('trocarVideoTodos', (d) => {
                        if(v.src !== d.url) v.src = d.url;
                        v.currentTime = d.tempo;
                        v.play();
                    });

                    s.on('sincronizarEntrada', (d) => {
                        if(d.url) { v.src = d.url; v.currentTime = d.tempo; v.play(); }
                    });

                    // Avisa o servidor o tempo atual do vídeo
                    v.ontimeupdate = () => s.emit('tempoAtual', v.currentTime);
                </script>
            </body>
        </html>
    "></iframe>

    <script>
        const socket = io();
        function transmitir() {
            const url = document.getElementById('urlVideo').value;
            if(url) {
                socket.emit('mudarVideo', { url: url, tempo: 0 });
            }
        }
    </script>
</body>
</html>
